<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Giacomini – La tua opinione</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #C8102E;
      padding: 0 24px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 12px rgba(200,16,46,0.3);
      flex-shrink: 0;
    }

    .header-brand { display: flex; align-items: center; gap: 14px; }
    .header-logo { font-size: 22px; font-weight: 700; color: #fff; letter-spacing: 2px; text-transform: uppercase; }
    .header-divider { width: 1px; height: 20px; background: rgba(255,255,255,0.35); }
    .header-subtitle { font-size: 12px; color: rgba(255,255,255,0.85); font-weight: 500; }
    .header-badge { font-size: 11px; color: rgba(255,255,255,0.75); border: 1px solid rgba(255,255,255,0.3); padding: 3px 10px; border-radius: 20px; }

    #chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 28px 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      max-width: 640px;
      width: 100%;
      margin: 0 auto;
    }

    .bubble {
      max-width: 82%;
      padding: 13px 18px;
      border-radius: 18px;
      font-size: 15px;
      line-height: 1.55;
      animation: fadeUp 0.22s ease;
      white-space: pre-wrap;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .bubble.bot {
      background: #fff;
      color: #1a1a1a;
      border-bottom-left-radius: 4px;
      align-self: flex-start;
      box-shadow: 0 1px 6px rgba(0,0,0,0.07);
      border: 1px solid #ebebeb;
    }

    .bubble.user {
      background: #C8102E;
      color: #fff;
      border-bottom-right-radius: 4px;
      align-self: flex-end;
      box-shadow: 0 2px 8px rgba(200,16,46,0.3);
    }

    .bubble.typing {
      background: #fff;
      align-self: flex-start;
      border: 1px solid #ebebeb;
      box-shadow: 0 1px 6px rgba(0,0,0,0.07);
    }

    .typing-dots { display: flex; gap: 5px; padding: 3px 2px; }
    .typing-dots span {
      width: 7px; height: 7px;
      background: #C8102E;
      border-radius: 50%;
      opacity: 0.6;
      animation: bounce 1.2s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.6; }
      40%            { transform: translateY(-5px); opacity: 1; }
    }

    .options-container {
      display: flex;
      flex-direction: column;
      gap: 7px;
      align-self: flex-start;
      max-width: 82%;
      animation: fadeUp 0.22s ease;
    }

    .option-btn {
      background: #fff;
      border: 1.5px solid #C8102E;
      color: #C8102E;
      border-radius: 10px;
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      text-align: left;
      transition: all 0.15s;
      line-height: 1.4;
    }

    .option-btn:hover { background: #C8102E; color: #fff; box-shadow: 0 2px 8px rgba(200,16,46,0.25); }
    .option-btn.selected { background: #C8102E; color: #fff; pointer-events: none; box-shadow: 0 2px 8px rgba(200,16,46,0.25); }

    #input-area {
      background: #fff;
      border-top: 1px solid #e8e8e8;
      padding: 14px 16px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      max-width: 640px;
      width: 100%;
      margin: 0 auto;
    }

    #user-input {
      flex: 1;
      border: 1.5px solid #ddd;
      border-radius: 24px;
      padding: 10px 18px;
      font-size: 14px;
      resize: none;
      max-height: 120px;
      line-height: 1.45;
      outline: none;
      transition: border-color 0.15s;
      font-family: inherit;
      background: #fafafa;
      color: #1a1a1a;
    }

    #user-input:focus { border-color: #C8102E; background: #fff; }
    #user-input::placeholder { color: #aaa; }

    #send-btn {
      background: #C8102E;
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 44px;
      height: 44px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, box-shadow 0.15s;
      box-shadow: 0 2px 8px rgba(200,16,46,0.25);
    }

    #send-btn:hover { background: #a00d24; }
    #send-btn:disabled { background: #ccc; cursor: not-allowed; box-shadow: none; }
    #send-btn svg { width: 18px; height: 18px; }

    .complete-banner {
      background: #fff;
      border: 1.5px solid #C8102E;
      border-radius: 14px;
      padding: 20px 24px;
      text-align: center;
      color: #C8102E;
      font-weight: 600;
      font-size: 15px;
      align-self: center;
      max-width: 82%;
      box-shadow: 0 4px 16px rgba(200,16,46,0.12);
    }

    .complete-banner .check { font-size: 32px; display: block; margin-bottom: 10px; }
    .complete-banner .sub { font-weight: 400; font-size: 13px; color: #777; display: block; margin-top: 6px; }

    .option-btn.multi-selected {
      background: var(--red-light);
      border-color: var(--red);
      color: var(--red);
    }

    .confirm-btn {
      background: var(--red);
      color: #fff;
      border-color: var(--red);
      margin-top: 6px;
      font-size: 13px;
      opacity: 1;
    }

    .confirm-btn:disabled {
      background: #e5e5e5;
      color: #aaa;
      border-color: #e5e5e5;
      cursor: not-allowed;
      box-shadow: none;
    }

    .confirm-btn:not(:disabled):hover {
      background: var(--red-dark);
    }

    .nps-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 6px;
    }

    .nps-grid .option-btn {
      padding: 10px 4px;
      text-align: center;
      font-size: 15px;
      font-weight: 700;
    }
  </style>
</head>
<body>

<header>
  <div class="header-brand">
    <span class="header-logo">Giacomini</span>
    <span class="header-divider"></span>
    <span class="header-subtitle">Ricerca percezione brand</span>
  </div>
  <span class="header-badge">Riservata ai professionisti</span>
</header>

<div id="chat-container"></div>

<div id="input-area" style="display:none">
  <textarea id="user-input" placeholder="Scrivi qui la tua risposta…" rows="1"></textarea>
  <button id="send-btn" disabled>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="22" y1="2" x2="11" y2="13"></line>
      <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
    </svg>
  </button>
</div>

<script>
  const chatContainer = document.getElementById('chat-container');
  const userInput = document.getElementById('user-input');
  const sendBtn = document.getElementById('send-btn');

  const sessionId = 'sess_' + Math.random().toString(36).slice(2) + Date.now();
  let isComplete = false;
  let buttonsActive = false; // true while option buttons are waiting for user input

  function scrollBottom() { chatContainer.scrollTop = chatContainer.scrollHeight; }

  // Detects numbered options AND whether multi-select is allowed
  function parseOptions(text) {
    const lines = (text || '').split('\n');
    const options = [];
    const questionLines = [];
    let foundOptions = false;

    for (const line of lines) {
      const match = line.match(/^(\d+)[.)]\s+(.+)$/);
      if (match) {
        options.push(match[2].trim());
        foundOptions = true;
      } else if (!foundOptions) {
        const cleaned = line
          .replace(/per favore,?\s*rispondi con il numero.*$/i, '')
          .replace(/rispondi con il numero.*$/i, '')
          .trim();
        if (cleaned) questionLines.push(cleaned);
      }
    }

    // Detect max selections from question text
    const maxMatch = text.match(/scegli max\s*(\d+)|max\s*(\d+)/i);
    const isMultiAny = /più di uno|scegliere più/i.test(text);
    const maxSelect = maxMatch
      ? parseInt(maxMatch[1] || maxMatch[2])
      : (isMultiAny ? 99 : 1);

    // Detect NPS grid (options are only digits 0-10)
    const isNps = options.length >= 5 && options.every(o => /^\d{1,2}$/.test(o));

    return { questionText: questionLines.join('\n').trim() || text, options, maxSelect, isNps };
  }

  function setInputEnabled(enabled) {
    const inputArea = document.getElementById('input-area');
    inputArea.style.display = enabled ? 'flex' : 'none';
    userInput.disabled = !enabled;
    sendBtn.disabled = !enabled || userInput.value.trim() === '';
    if (enabled) { userInput.value = ''; userInput.focus(); }
  }

  function addBubble(text, role) {
    if (role === 'bot') {
      const { questionText, options, maxSelect, isNps } = parseOptions(text);

      if (options.length >= 2) {
        const bubble = document.createElement('div');
        bubble.className = 'bubble bot';
        bubble.textContent = questionText;
        chatContainer.appendChild(bubble);

        const container = document.createElement('div');
        container.className = 'options-container';
        if (isNps) container.classList.add('nps-grid');

        if (maxSelect > 1) {
          // ── MULTI-SELECT ──────────────────────────────────────
          const selected = [];

          const confirmBtn = document.createElement('button');
          confirmBtn.className = 'option-btn confirm-btn';
          confirmBtn.disabled = true;
          confirmBtn.textContent = `Conferma (0 di max ${maxSelect})`;

          options.forEach((opt) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.textContent = isNps ? opt : opt;
            btn.addEventListener('click', () => {
              if (btn.classList.contains('multi-selected')) {
                btn.classList.remove('multi-selected');
                selected.splice(selected.indexOf(opt), 1);
              } else if (selected.length < maxSelect) {
                btn.classList.add('multi-selected');
                selected.push(opt);
              }
              const n = selected.length;
              confirmBtn.disabled = n === 0;
              confirmBtn.textContent = n === 0
                ? `Conferma (0 di max ${maxSelect})`
                : `Conferma ${n} ${n === 1 ? 'risposta' : 'risposte'}`;
            });
            container.appendChild(btn);
          });

          confirmBtn.addEventListener('click', () => {
            container.querySelectorAll('button').forEach(b => b.disabled = true);
            buttonsActive = false;
            sendMessage(selected.join(', '));
          });
          container.appendChild(confirmBtn);

        } else {
          // ── SINGLE-SELECT ─────────────────────────────────────
          options.forEach((opt) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.textContent = isNps ? opt : opt;
            btn.addEventListener('click', () => {
              container.querySelectorAll('button').forEach(b => b.disabled = true);
              btn.classList.add('selected');
              buttonsActive = false;
              sendMessage(opt);
            });
            container.appendChild(btn);
          });
        }

        chatContainer.appendChild(container);
        setInputEnabled(false);
        buttonsActive = true;
        scrollBottom();
        return;
      }
    }

    const div = document.createElement('div');
    div.className = 'bubble ' + role;
    div.textContent = text || '';
    chatContainer.appendChild(div);
    scrollBottom();
  }

  function showTyping() {
    const div = document.createElement('div');
    div.className = 'bubble typing';
    div.id = 'typing-indicator';
    div.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
    chatContainer.appendChild(div);
    scrollBottom();
  }

  function removeTyping() {
    const el = document.getElementById('typing-indicator');
    if (el) el.remove();
  }

  async function sendMessage(text) {
    if (isComplete) return;
    if (text) addBubble(text, 'user');

    setInputEnabled(false);
    buttonsActive = false;
    showTyping();

    try {
      const res = await fetch('/api/survey/message', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sessionId, message: text || '' }),
      });

      const rawText = await res.text();
      console.log('[survey] HTTP', res.status, rawText.substring(0, 300));

      let data;
      try {
        data = JSON.parse(rawText);
      } catch (parseErr) {
        throw new Error('Risposta non JSON (HTTP ' + res.status + '): ' + rawText.substring(0, 120));
      }

      removeTyping();
      addBubble(data.reply || data.error || '(risposta vuota)', 'bot');

      if (data.complete) {
        isComplete = true;
        const banner = document.createElement('div');
        banner.className = 'complete-banner';
        banner.innerHTML = '<span class="check">✓</span>Grazie per il tuo contributo!<span class="sub">Le tue risposte ci aiuteranno a migliorare.</span>';
        chatContainer.appendChild(banner);
        setInputEnabled(false);
        scrollBottom();
        return;
      }
    } catch (e) {
      console.error('[survey] sendMessage error:', e.message);
      removeTyping();
      addBubble('Errore: ' + e.message, 'bot');
    }

    // Re-enable input only if no buttons are waiting for a click
    if (!buttonsActive) setInputEnabled(true);
  }

  userInput.addEventListener('input', () => {
    sendBtn.disabled = userInput.value.trim() === '' || isComplete;
    userInput.style.height = 'auto';
    userInput.style.height = Math.min(userInput.scrollHeight, 120) + 'px';
  });

  userInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      const text = userInput.value.trim();
      if (text && !isComplete) {
        userInput.value = '';
        userInput.style.height = 'auto';
        sendMessage(text);
      }
    }
  });

  sendBtn.addEventListener('click', () => {
    const text = userInput.value.trim();
    if (text && !isComplete) {
      userInput.value = '';
      userInput.style.height = 'auto';
      sendMessage(text);
    }
  });

  sendMessage('');
</script>
</body>
</html>
